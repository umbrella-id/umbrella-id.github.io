<body>
    <div class="master-frame">
        <header id="headline-pc-area">
            <h1 id="headline-title">CONNECTING...</h1>
        </header>

        <aside class="main-header">
            <div id="logo-container">
                </div>
            <div class="slogan-box">
                <span class="slogan-main">UMBRELLA GUILD</span>
                <span class="slogan-sub">Tempat Kita Berteduh & Bertumbuh</span>
            </div>
        </aside>

        <main class="content-panggung" id="main-stage">
            <div class="card" id="card-headline"></div>
            <div id="slot-profile"></div>
            <div id="slot-gallery"></div>
        </main>

        <footer class="pc-footer">
            <span id="headline-pc-footer">© 2026 Umbrella Guild System Architect</span>
        </footer>
    </div>

    <div class="top-tools" onclick="openInbox()">
        <i class="fas fa-envelope"></i> <span>KOTAK SURAT</span>
    </div>

    <div class="floating-chat">
        <div class="chat-trigger" onclick="toggleChat()">
            <i class="fas fa-comments"></i>
        </div>
    </div>

    <div class="modal-overlay" id="inboxOverlay">
        <div class="mail-modal">
            <span class="close-x" onclick="closeInbox()">×</span>
            <iframe id="mailFrame" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <script src="main.js"></script>
</body>
