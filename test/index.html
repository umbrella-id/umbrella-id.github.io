<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrella | Toram Online</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header id="headline-pc-area">
        <h1 id="headline-title">LOADING...</h1>
    </header>
    
    <aside class="main-header">
        <div id="logo-container"></div>
        <div class="slogan-box">
            <span class="slogan-main">Tempat Kita Berteduh dan Bertumbuh</span>
            <span class="slogan-sub">Dari pertemuan jadi kebersamaan</span>
            <span class="slogan-sub">Dari serikat jadi keluarga</span>
        </div>
    </aside>
    
    <main class="content-panggung" id="main-stage">
        <section class="card" id="card-headline"><h2>Loading...</h2></section>
        <section class="card" id="slot-profile"><h2>Loading Profile...</h2></section>
        <section class="card" id="slot-gallery"><h2>Loading Gallery...</h2></section>
    </main>
    
    <footer class="pc-footer">
        <p id="headline-pc-footer">Loading details...</p>
    </footer>

    <div class="floating-tools">
        <button class="btn-float" onclick="bukaKotakSurat()" title="Kotak Surat">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </button>
        <button class="btn-float" onclick="bukaChat()" title="Chat Admin">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
    </div>

    <script src="main.js"></script>
</body>
</html>
