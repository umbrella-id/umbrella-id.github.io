<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrella Guild - Official System</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="master-frame">
        <header id="headline-pc-area">
            <h1 id="headline-title">UMBRELLA GUILD</h1>
        </header>
        
        <aside class="main-header">
            <div id="logo-container">
                </div>
            <div class="slogan-box">
                <span class="slogan-main">Tempat Kita Berteduh dan Bertumbuh</span>
                <div class="slogan-sub-wrapper">
                    <span class="slogan-sub">Dari serikat jadi keluarga</span>
                </div>
            </div>
        </aside>
        
        <main class="content-panggung" id="main-stage">
            <section class="card" id="card-headline"><h2>HEADLINE</h2></section>
            <section class="card" id="slot-profile"><h2>PROFILE</h2></section>
            <section class="card" id="slot-gallery"><h2>GALLERY</h2></section>
        </main>
        
        <footer class="pc-footer">
            <p id="headline-pc-footer">© 2026 Umbrella Guild System Architect</p>
        </footer>
    </div>

    <div class="top-tools" onclick="alert('Buka Kotak Surat')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        <span>KOTAK SURAT</span>
    </div>

    <div class="floating-chat">
        <div class="chat-trigger" onclick="alert('Buka Chat')">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
