<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="assets/style.css">
    <style>
      /* Animasi biar perpindahan layer mulus */
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      #panggung { min-height: 400px; border: 1px dashed var(--border-color); border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>

  <div class="main-container">
    <h1 class="glow-effect">Markas Besar Umbrella</h1>
    
    <div style="margin-bottom: 20px; display: flex; gap: 10px;">
      <button class="btn-umbrella" onclick="suntikModul('surat.html')">Buka Surat</button>
      <button class="btn-umbrella" onclick="suntikModul('chat.html')">Buka Chat</button>
    </div>

    <div id="panggung">
      <p style="text-align: center; color: var(--text-muted);">Silakan pilih menu untuk memanggil layer...</p>
    </div>
  </div>

  <script>
    async function suntikModul(file) {
      const panggung = document.getElementById('panggung');
      
      // 1. Kasih feedback loading
      panggung.innerHTML = "<p class='glow-effect' style='text-align:center;'>Menyuntikkan Layer...</p>";
      
      try {
        // 2. Ambil potongan HTML dari file sebelah
        const respon = await fetch(file);
        const konten = await respon.text();
        
        // 3. Masukkan potongan tadi ke dalam panggung
        panggung.innerHTML = konten;
        
        // 4. Jalankan script yang ada di dalam potongan tersebut
        // (Penting: Browser tidak otomatis jalankan <script> dari innerHTML, 
        // tapi untuk pemula ini cara termudah buat paham alurnya)
        const scripts = panggung.getElementsByTagName('script');
        for (let s of scripts) { eval(s.innerText); }
        
      } catch (e) {
        panggung.innerHTML = "<p>Gagal memanggil layer.</p>";
      }
    }
  </script>
</body>
</html>
