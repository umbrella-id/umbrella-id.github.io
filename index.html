<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Umbrella - Toram Online</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/identity.css">
    <link rel="stylesheet" href="css/pc-mode.css" media="screen and (min-width: 768px)">
    <link rel="stylesheet" href="css/mobile-mode.css" media="screen and (max-width: 767px)">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/mailbox.css">
</head>
<body>
    <div id="site-gatekeeper">
        <div class="portal-box">
            <span class="close-gate" onclick="closeGate()">&times;</span>
            
            <h2 id="gate-title">Selamat Datang</h2>
    
            <div class="input-row">
                <input type="text" id="global-ign-input" placeholder="masukan nama / IGN" maxlength="15" autocomplete="off">
                <button id="save-btn" onclick="saveIdentity()">
                    <i class="fa-solid fa-check"></i>
                </button>
            </div>
        </div>
    </div>
    
    <div class="mail-container" id="mail-trigger" onclick="toggleMail()">
        <i class="fa-solid fa-envelope-open-text"></i> KOTAK SURAT
    </div>
    <div id="ign-label-container" onclick="unlockSite()">
        <i class="fas fa-user-circle"></i>
        <span id="current-ign-display"></span>
    </div>
    <div class="running-text-wrapper" id="marquee-area">
        <div class="running-text-content" id="pc-marquee"></div>
    </div>
    <div class="sosmed-corner" id="sosmed-area">
        <a href="#" class="sosmed-link"><i class="fab fa-whatsapp"></i></a>
        <a href="#" class="sosmed-link"><i class="fab fa-facebook"></i></a>
        <a href="#" class="sosmed-link"><i class="fab fa-discord"></i></a>
    </div>
    <div class="chat-container" id="chat-trigger" onclick="toggleChat()">
        <i class="fa-solid fa-comments"></i>
    </div>
    
    <div class="master-frame">
        <div class="top-bar">
            <div class="pc-header-text" id="pc-title-target">SELAMAT DATANG</div>
        </div>
        <div class="content-wrapper">
            
            <div class="sidebar-brand" id="sidebar-area">
                <div class="logo-wrapper">
                    <img src="logo-umbrella.svg" id="main-logo" alt="Logo Umbrella">
                </div>
                <div class="brand-container">
                    <div class="brand-main">Tempat Kita Berteduh dan Bertumbuh</div>
                    <div class="brand-sub">dari pertemuan jadi kebersamaan<br>dari serikat jadi keluarga</div>
                </div>
            </div>

            <div id="app-container">
                <div id="main-stacker">
                    <div class="stacker-card is-active">
                        <div class="card-content">
                            <h2>MEMUAT DATA...</h2>
                            <p>Menghubungkan ke server Umbrella...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <p class="headline-body-pc"></p>
            <span class="inline-link-text"></span>
        </div>
    </div>

    <div id="chat-popup" class="chat-popup-hidden">
        <div id="chat-header">
            <span id="admin-status">ADMIN : <b class="status-online">ONLINE</b></span>
        </div>
        <div id="chat-logs"></div>
        <div class="chat-input-area">
            <div class="input-row">
                <input type="text" id="msg-input" placeholder="Ketik pesan..." onkeypress="handleEnter(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <div id="mail-modal" class="mail-modal-hidden">
        <div class="mail-modal-content">
            <div class="mail-modal-header">
                <h3><i class="fa-solid fa-envelope"></i> KIRIM SURAT</h3>
                <span class="close-mail" onclick="toggleMail()">&times;</span>
            </div>
            <div class="mail-modal-body">
                <div class="mail-input-group">
                    <label>Kategori Surat :</label>
                    <select id="mail-category" onchange="aturFormMailbox()">
                        <option value="Umum">📝 UMUM / GENERAL</option>
                        <option value="Request Join">🛡️ REQUEST JOIN</option>
                        <option value="Saran">💡 SARAN / MASUKAN</option>
                    </select>
                </div>
            
                <div class="mail-input-group" id="wa-group" style="display: none;">
                    <label>Nomor WhatsApp Aktif :</label>
                    <input type="number" id="mail-wa" placeholder="Contoh: 08xxxxxxxxxx">
                </div>
            
                <div class="mail-input-group">
                    <label id="mail-label-pesan">Pesan Anda :</label>
                    <textarea id="mail-message" placeholder="Tulis pesan atau laporan untuk Admin Umbrella..." rows="5"></textarea>
                </div>
                
                <button class="mail-send-btn" onclick="sendMail()">
                    <i class="fa-solid fa-paper-plane"></i> KIRIM SEKARANG
                </button>
            </div> </div> </div> <div id="mail-toast"></div>
    
    <script src="js/identity.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
