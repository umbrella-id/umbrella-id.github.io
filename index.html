<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Umbrella Guild Portal</title>
    
    <!-- 1. CSS INTI: Gaya kartu & Z-Index -->
    <link rel="stylesheet" href="css/base.css">
    
    <!-- 2. CSS PC: Layout Grid & Sidebar -->
    <link rel="stylesheet" href="css/pc-mode.css" media="screen and (min-width: 768px)">
    
    <!-- 3. CSS MOBILE: Layout Tumpuk & Floating -->
    <link rel="stylesheet" href="css/mobile-mode.css" media="screen and (max-width: 767px)">
</head>
<body>

    <div class="master-frame">
        
        <!-- HEADER: Kotak Surat -->
        <div class="top-bar">
            <div class="pc-header-text">HEADER</div>
            <div class="mail-container" id="mail-trigger">KOTAK SURAT</div>
        </div>

        <!-- AREA TENGAH: Sidebar & Slider -->
        <div class="content-wrapper">
            
            <!-- SIDEBAR: Tempat Logo di PC -->
            <div class="sidebar-brand" id="sidebar-area">
                <!-- Di Mobile, area ini akan kosong karena logo pindah ke dalam slider -->
                <div class="slogan-text">Selogan</div>
            </div>

            <!-- SLIDER: Tempat Kartu & Logo Mobile -->
            <div id="slider-container">
                
                <!-- KONTEN LOGO: Satu-satunya elemen logo yang dipakai bersama -->
                <div class="logo-wrapper">
                    <img src="logo-umbrella.svg" id="main-logo" alt="Logo Umbrella">
                </div>

                <div id="main-slider">
                    <!-- KARTU 1 -->
                    <div class="card-element is-active">
                        <div class="card-content">
                            <h2>BUFF SERIKAT</h2>
                            <ul>
                                <li>PARON SERIKAT LV.10 - ✅</li>
                                <li>MEJA JAHIT SERIKAT LV.10 - ✅</li>
                            </ul>
                        </div>
                    </div>

                    <!-- KARTU 2 -->
                    <div class="card-element">
                        <div class="card-content">
                            <h2>WHATSAPP</h2>
                            <p>https:// ....</p>
                        </div>
                    </div>
                    
                    <!-- Tambahkan kartu lainnya di sini -->
                </div>
            </div>
        </div>

        <!-- FOOTER: Icon Chat -->
        <div class="bottom-bar">
            <div class="pc-footer-text">FOTHER</div>
            <div class="chat-container" id="chat-trigger">
                <div class="chat-icon">💬</div>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
