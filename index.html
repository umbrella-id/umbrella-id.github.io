<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Umbrella Guild Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="master-frame">
        <header id="header-area"></header>

        <aside id="brand-area">
            <img src="logo-umbrella.svg" alt="Logo" id="pc-logo">
            <div class="system-tag">SYSTEM ACCESS</div>
        </aside>

        <!-- Hint Minimalis Tanpa Blok Hitam -->
        <div id="swipe-hint">
            <div class="hint-arrow up">▲</div>
            <span class="hint-text">SWIPE TO NAVIGATE</span>
            <div class="hint-arrow down">▼</div>
        </div>

        <main id="slider-container">
            <div id="main-slider"></div>
        </main>

        <footer id="footer-area">
            <div class="status-bar">GUILD STATUS: <span id="status-text">ONLINE</span></div>
        </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
