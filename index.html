<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Umbrella Guild Portal</title>
    
    <!-- 1. CSS INTI: Gaya kartu & Z-Index -->
    <link rel="stylesheet" href="css/base.css">
    
    <!-- 2. CSS PC: Layout Grid & Sidebar -->
    <link rel="stylesheet" href="css/pc-mode.css" media="screen and (min-width: 768px)">
    
    <!-- 3. CSS MOBILE: Layout Tumpuk & Floating -->
    <link rel="stylesheet" href="css/mobile-mode.css" media="screen and (max-width: 767px)">
</head>
<body>
  <div class="master-frame">
      
      <!-- HEADER -->
      <div class="top-bar">
          <div class="pc-header-text">HEADER</div>
          <div class="mail-container" id="mail-trigger">KOTAK SURAT</div>
      </div>
  
      <div class="content-wrapper">
          
          <!-- SIDEBAR PC (Biarkan begini, nanti kita urus di PC Mode) -->
          <div class="sidebar-brand" id="sidebar-area">
              <!-- Logo Umbrella: Biar muncul di HP di tengah layar -->
              <div class="logo-sidebar">
                  <img src="logo-umbrella.svg" id="main-logo" alt="Logo Umbrella">
              </div>
              <div class="slogan-text">Selogan</div>
          </div>
  
          <!-- ========================================== -->
          <!--                  PC-MODE                   -->
          <!-- ========================================== -->
          <div class="pc-only-slider" id="slider-container">
              <!-- KARTU 1 -->
              <div class="slide-card">
                  <div class="card-content">
                      <h2>PC MODE</h2>
                      <ul>
                          <li>- min-width: 768px</li>
                          <li>- landscape</li>
                      </ul>
                  </div>
              </div>
  
              <!-- KARTU 2 -->
              <div class="slide-card">
                  <div class="card-content">
                      <h2>WHATSAPP</h2>
                      <p>https:// ....</p>
                  </div>
              </div>
          </div>
  
          <!-- ========================================== -->
          <!--                MOBILE-MODE                 -->
          <!-- ========================================== -->
          <div class="mobile-only-stack" id="stacker-container">
              
              <!-- Logo Umbrella: Biar muncul di HP di tengah layar -->
              <div class="logo-wrapper">
                  <img src="logo-umbrella.svg" id="main-logo" alt="Logo Umbrella">
              </div>
  
              <!-- Slider tempat kartu bertumpuk -->
              <div id="main-stacker">
                  <!-- KARTU 1 -->
                  <div class="stack-card is-active">
                      <div class="card-content">
                          <h2>MOBILE MODE</h2>
                          <ul>
                              <li>- max-width: 767px</li>
                              <li>- portrait</li>
                          </ul>
                      </div>
                  </div>
  
                  <!-- KARTU 2 -->
                  <div class="stack-card">
                      <div class="card-content">
                          <h2>WHATSAPP</h2>
                          <p>https:// ....</p>
                      </div>
                  </div>
              </div>
          </div>
  
      </div>
  
      <!-- FOOTER -->
      <div class="bottom-bar">
          <div class="pc-footer-text">FOTHER</div>
          <div class="chat-container" id="chat-trigger">
              <div class="chat-icon">💬</div>
          </div>
      </div>
  
  </div>
</body>
</html>
