<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Umbrella Guild Portal</title>
    
    <!-- 1. CSS INTI: Gaya kartu & Z-Index -->
    <link rel="stylesheet" href="css/base.css">
    
    <!-- 2. CSS PC: Layout Grid & Sidebar -->
    <link rel="stylesheet" href="css/pc-mode.css" media="screen and (min-width: 768px)">
    
    <!-- 3. CSS MOBILE: Layout Tumpuk & Floating -->
    <link rel="stylesheet" href="css/mobile-mode.css" media="screen and (max-width: 767px)">
</head>
<body>
    <div class="master-frame">
        <header class="top-bar">
            <div class="pc-header-text">HEADER</div>
            <div class="mail-container" id="mail-trigger">KOTAK SURAT</div>
        </header>

        <main class="content-body">
            <!-- Tempat asal logo (Sidebar PC) -->
            <aside class="sidebar-brand" id="logo-home">
                <img src="logo-umbrella.svg" id="main-logo" alt="Logo">
                <div class="slogan" id="slogan-text">Selogan</div>
            </aside>
            
            <section id="slider-container">
                <div id="main-slider">
                    <!-- Kartu akan di-inject JS ke sini -->
                </div>
            </section>
        </main>

        <footer class="bottom-bar">
            <div class="pc-footer-text">FOTHER</div>
            <div class="chat-container">
                <div class="chat-icon" id="chat-trigger">💬</div>
            </div>
        </footer>

        <!-- Popup System (Layer 2000) -->
        <div class="popup-overlay" id="global-popup">
            <div class="popup-content">
                <div id="popup-body"></div>
                <button onclick="closePopup()">TUTUP</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
