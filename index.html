<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Umbrella Guild Portal</title>
    
    <!-- CSS kamu tetap sama -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/pc-mode.css" media="screen and (min-width: 768px)">
    <link rel="stylesheet" href="css/mobile-mode.css" media="screen and (max-width: 767px)">
</head>
<body>

    <div class="master-frame">
        
        <!-- HEADER -->
        <div class="top-bar">
            <div class="pc-header-text">SELAMAT DATANG</div>
            <!-- JS mencari mail-container untuk mengisi icon & teks -->
            <div class="mail-container" id="mail-trigger"></div> 
        </div>

        <!-- AREA TENGAH -->
        <div class="content-wrapper">
            
            <!-- SIDEBAR (PC ONLY) -->
            <div class="sidebar-brand" id="sidebar-area">
                <!-- Logo ini akan tampil di PC melalui CSS -->
                <div class="logo-wrapper">
                    <img src="logo-umbrella.svg" id="main-logo" alt="Logo Umbrella">
                </div>
                <div class="slogan-text">UMBRELLA GUILD</div>
            </div>

            <!-- stacker CONTAINER -->
            <div id="stacker-container">
                <!-- [PENTING] JS kamu menyuntikkan kartu ke dalam id="main-stacker" -->
                <div id="main-stacker">
                    <!-- Biarkan kosong atau isi 1 kartu 'Loading' -->
                    <div class="stacker-card is-active">
                        <div class="card-content">
                            <h2>MEMUAT DATA...</h2>
                            <p>Menghubungkan ke server Umbrella...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="bottom-bar">
            <div class="pc-footer-text">© 2024 UMBRELLA CORP</div>
            <!-- JS mencari chat-container untuk mengisi icon -->
            <div class="chat-container" id="chat-trigger"></div>
        </div>

    </div>

    <!-- JS di bawah agar elemen HTML terbaca dulu -->
    <script src="js/app.js"></script>
</body>
</html>
